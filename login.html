<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منشئ النماذج برو</title>
    <base href="/forms/">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-layout {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .auth-left {
            flex: 1;
            background: var(--primary-gradient);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .auth-left {
                display: flex;
            }
        }

        .auth-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: var(--bg-surface);
        }

        .auth-form-container {
            width: 100%;
            max-width: 420px;
        }

        .auth-logo {
            font-family: var(--font-heading);
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .auth-heading {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .auth-subheading {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        /* Fancy background shapes */
        .glass-shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: -50px;
            left: -100px;
            transform: rotate(45deg);
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -50px;
            border-radius: 50%;
        }

        .shape-3 {
            width: 150px;
            height: 150px;
            top: 30%;
            right: 20%;
            transform: rotate(-15deg);
        }
    </style>
</head>

<body>

    <div class="auth-layout">
        <!-- Left Banner -->
        <div class="auth-left">
            <div class="glass-shape shape-1"></div>
            <div class="glass-shape shape-2"></div>
            <div class="glass-shape shape-3"></div>

            <div style="position: relative; z-index: 10;" class="animate-slide-up">
                <h1 style="font-size: 3.5rem; margin-bottom: 1.5rem; line-height: 1.1; color: white;">أنشئ نماذج رائعة
                    في دقائق.</h1>
                <p style="font-size: 1.25rem; opacity: 0.9; max-width: 80%;">أنشئ، شارك، وحلل النماذج والاستبيانات
                    القوية بدون كتابة سطر كود واحد.</p>

                <div style="margin-top: 4rem; display: flex; align-items: center; gap: 1rem;">
                    <div style="display: flex;">
                        <span
                            style="width: 40px; height: 40px; border-radius: 50%; background: #fff; margin-right: -10px; border: 2px solid var(--primary);"></span>
                        <span
                            style="width: 40px; height: 40px; border-radius: 50%; background: #e0e7ff; margin-right: -10px; border: 2px solid var(--primary);"></span>
                        <span
                            style="width: 40px; height: 40px; border-radius: 50%; background: #c7d2fe; border: 2px solid var(--primary);"></span>
                    </div>
                    <div>
                        <p style="font-weight: 600; font-size: 1.1rem; margin:0;">انضم لأكثر من 10,000 فريق</p>
                        <p style="font-size: 0.9rem; opacity: 0.8; margin:0;">موثوق من أفضل الشركات</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Form -->
        <div class="auth-right">
            <div class="auth-form-container animate-fade-in">
                <div class="auth-logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                        <path d="M8 14h.01"></path>
                        <path d="M12 14h.01"></path>
                        <path d="M16 14h.01"></path>
                        <path d="M8 18h.01"></path>
                        <path d="M12 18h.01"></path>
                        <path d="M16 18h.01"></path>
                    </svg>
                    منشئ النماذج
                </div>

                <h2 class="auth-heading">مرحباً بعودتك</h2>
                <p class="auth-subheading">أدخل بياناتك للوصول إلى حسابك.</p>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email">البريد الإلكتروني</label>
                        <input type="email" id="email" class="form-control" required placeholder="name@company.com">
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <div style="display: flex; justify-content: space-between;">
                            <label class="form-label" for="password">كلمة المرور</label>
                        </div>
                        <input type="password" id="password" class="form-control" required placeholder="••••••••">
                    </div>

                    <button type="submit" id="loginBtn" class="btn-primary"
                        style="width: 100%; padding: 0.85rem; font-size: 1.05rem;">
                        تسجيل الدخول للوحة التحكم
                    </button>
                </form>


            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
