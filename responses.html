<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإحصائيات - منشئ النماذج برو</title>
    <base href="/">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .builder-nav {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border-color);
        }
        .tab {
            padding: 1rem 0.5rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .tab:hover { color: var(--text-main); }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content { display: none; animation: fadeIn 0.4s ease-out; }
        .tab-content.active { display: block; }

        .chart-container {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .chart-container:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        @media(min-width: 900px) {
            .charts-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
                gap: 2rem;
                align-items: start;
            }
        }

        .table-container {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            overflow-x: auto;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            margin-bottom: 3rem;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }
        th, td {
            text-align: left;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        th { 
            background: var(--bg-offset); 
            font-weight: 600; 
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        td { color: var(--text-main); }
        tr:hover td { background: var(--bg-offset); }
        
        .stat-card {
            background: var(--bg-surface);
            padding: 2rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            border-left: 6px solid var(--primary);
            max-width: 350px;
        }
        .stat-icon {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: var(--bg-offset);
            color: var(--primary);
            display: flex; align-items: center; justify-content: center;
        }
        .stat-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1;
            font-family: var(--font-heading);
        }
    </style>
</head>
<body>
    <nav class="builder-nav animate-fade-in">
        <div class="flex items-center gap-4">
            <a href="index.html" class="btn-ghost btn-icon-only" title="العودة للوحة التحكم" style="padding: 0.5rem; display: flex;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: scaleX(-1);"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h2 id="fTitle" style="font-size: 1.25rem; font-weight: 700;">جاري تحميل الإحصائيات...</h2>
        </div>
        <div class="flex items-center gap-2">
            <button class="btn-primary" id="exportCsvBtn" style="padding: 0.6rem 1.25rem;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 0.5rem; transform: scaleX(-1);"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                تصدير إلى إكسل
            </button>
        </div>
    </nav>

    <div class="container animate-slide-up" style="max-width: 1400px; padding-top: 3rem;">
        
        <div class="tabs">
            <div class="tab active" data-target="analyticsTab">إحصائيات النموذج</div>
            <div class="tab" data-target="responsesTab">الردود الفردية</div>
        </div>

        <div id="analyticsTab" class="tab-content active">
            <div class="stat-card" style="margin-bottom: 3rem;">
                <div class="stat-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <div>
                    <div style="color: var(--text-muted); font-size: 1rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem;">إجمالي الردود</div>
                    <div class="stat-number" id="totalResponses">0</div>
                </div>
            </div>

            <div id="chartsContainer" class="charts-grid">
                <!-- Charts rendered here -->
            </div>
        </div>

        <div id="responsesTab" class="tab-content">
            <div class="table-container">
                <table id="responsesTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=4"></script>
    <script src="js/responses.js?v=4"></script>
</body>
</html>
