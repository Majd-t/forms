<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>منشئ النماذج - جاري التوجيه...</title>
    <script type="text/javascript">
      // GitHub Pages 404 Hack
      // This script takes the current path and converts it into a query parameter
      // so that index.html can handle it as a route.
      var pathSegmentsToKeep = 1; // "forms" is the subfolder

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
